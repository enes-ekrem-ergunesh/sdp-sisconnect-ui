<form class="d-flex" role="search" (ngSubmit)="onSubmit()">
  <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" [formControl]="search">
  <button class="btn btn-outline-success" type="submit">Search</button>
</form>
<div class="search-container" *ngIf="searchResults.value.length !== 0">
  <div (click)="reset()" [routerLink]="['/profile/' + linkToProfile(r)]" class="search-item btn btn-outline-light" *ngFor="let r of searchResults | async">
    <div class="search-image">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-person-circle"
           viewBox="0 0 16 16">
        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
        <path fill-rule="evenodd"
              d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
      </svg>
    </div>
    <div class="">
      <p class="search-text fs-5">{{r.first_name}} {{r.family_name}}</p>
    </div>
  </div>
</div>
