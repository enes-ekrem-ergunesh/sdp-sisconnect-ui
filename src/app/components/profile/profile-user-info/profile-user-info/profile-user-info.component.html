<div class="container-fluid pt-3 border border-secondary rounded">
  <app-edit-profile-user-info [profileAbout]="profileAbout"></app-edit-profile-user-info>
  <div class="row">
    <div class="col-12">
      <div class="row" *ngFor="let p of profileAbout">
        <div class="col-auto">
          <p class="p-0">{{p.name}}:</p>
        </div>
        <div class="col-auto ms-auto">
          <p class="text-end fw-bold">{{p.data}}</p>
        </div>
      </div>
    </div>
  </div>
</div>
