<div class="post-container">
  <div class="form-group">
    <textarea class="form-control" rows="3" placeholder="What's on your mind?" [(ngModel)]="postTextArea"></textarea>
  </div>
  <div class="d-flex mt-2">
    <button (click)="createPost()" type="button" class="btn btn-primary ms-auto">Post</button>
  </div>
</div>

<div class="mt-3" *ngFor="let p of posts | async">
  <div class="post">
    <div class="post-header">
      <div class="">
        <div class="ms-2">
          <div class="d-flex">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-person-circle"
                 viewBox="0 0 16 16">
              <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
              <path fill-rule="evenodd"
                    d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
            </svg>
            <p class="my-auto ms-2"><strong>{{user.first_name}} {{user.family_name}}</strong></p>
          </div>
          <hr class="mb-1">
          <p class="fs-5 mt-2 mb-2">{{ p.content }}</p>
          <div class="text-end">

          <small>{{p.time_ago}}</small>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
