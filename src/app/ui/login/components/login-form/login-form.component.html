<h1 class="text-center">Please sign in</h1>

<form class="px-2 mt-3">
  <!-- Email -->
  <ion-item>
    <ion-input
      type="email"
      fill="solid"
      label="Email"
      labelPlacement="floating"
    ></ion-input>
  </ion-item>

  <!-- Password -->
  <ion-item>
    <ion-input
      type="password"
      fill="solid"
      label="Password"
      labelPlacement="floating"
    ></ion-input>
  </ion-item>

  <!-- Remember me -->
  <ion-checkbox class="mt-3" labelPlacement="end">Remember me</ion-checkbox>

  <!-- Login button -->
  <ion-button type="submit" expand="block">Login</ion-button>
</form>
